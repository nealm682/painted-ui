<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>exp-10 — expressive verbs: the scene that sketches itself</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0910;font-family:Georgia,serif}
  canvas{display:block;width:100vw;height:100vh}
  #hud{position:fixed;left:14px;bottom:12px;color:#6f6a88;font:11.5px/1.5 monospace;pointer-events:none;white-space:pre-wrap;max-width:46vw}
  #hint{position:fixed;right:14px;bottom:12px;color:#6f6a88;font:11.5px monospace;text-align:right}
  #replay{position:fixed;right:14px;top:12px;background:rgba(20,18,28,.7);border:1px solid #2c2840;
          color:#c9c4dd;border-radius:8px;padding:6px 13px;font:13px Georgia;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="hint">the scene is sketched, then painted, then it lives<br>resize anytime — it re-composes · click the water</div>
<button id="replay">↻ repaint</button>
<script>
/* ============================================================
   exp-10: scene-grammar v2, Layer A, in pixels.
   New verbs implemented in the compositor (the model would only
   NAME them — each costs the protocol one word):
     strokeIn    — vector paths draw themselves tip-first
     materialize — fills arrive blurred and settle sharp
     inkSettle   — jitter decays as pigment dries
     maskReveal  — radial washes from the brush point
     typeSet     — words rise into place one at a time
   Plus the standing vocabulary: springs on resize, gardener
   palette cycle, ambient motion that never stops, self-healing
   render loop (exp-09's lesson).
   ============================================================ */
const cv=document.getElementById("c"),ctx=cv.getContext("2d"),hud=document.getElementById("hud");
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);resize();
const REDUCED=matchMedia("(prefers-reduced-motion: reduce)").matches,AMB=REDUCED?0.25:1;
const now=()=>performance.now(),lerp=(a,b,t)=>a+(b-a)*t;
const easeIO=u=>u<.5?4*u*u*u:1-Math.pow(-2*u+2,3)/2, easeO=u=>1-Math.pow(1-u,3);
function mixc(c1,c2,t){const h=c=>[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
 const a=h(c1),b=h(c2);return`rgb(${a.map((v,i)=>Math.round(lerp(v,b[i],t))).join(",")})`;}
function logNote(s){hud.textContent=(hud.textContent+"\n→ "+s).split("\n").slice(-6).join("\n");}

// ---------- palette / gardener ----------
const DUSK={sky1:"#2e2450",sky2:"#0d0b13",ink:"#efe9dc",sea:"#1d2c4b",seaHi:"#7fd4c1",
            tower:"#efe9dc",band:"#c4574d",beam:"#ffdf9e",accent:"#e8a34c"};
const NIGHT={sky1:"#0c1830",sky2:"#06080f",ink:"#e6ebf4",sea:"#0e1729",seaHi:"#9fb4e8",
             tower:"#cfd6e4",band:"#8f4a44",beam:"#fff3c8",accent:"#9fb4e8"};
let cyc=0;const pal=k=>mixc(DUSK[k],NIGHT[k],cyc);

// ---------- springy anchors (constraint re-solve on resize) ----------
function spr(v){return{x:v,v:0};}
function step(s,tg,dt,k=80,d=12){const f=k*(tg-s.x)-d*s.v;s.v+=f*dt;s.x+=s.v*dt;return s.x;}
const A={lx:spr(0.70),ly:spr(0.72),sc:spr(1),tx:spr(0.30),ty:spr(0.20),sunx:spr(0.24),suny:spr(0.30)};
function anchorTargets(){const narrow=W/H<0.95;
 return narrow?{lx:0.5,ly:0.62,sc:0.8,tx:0.5,ty:0.10,sunx:0.78,suny:0.12}
              :{lx:0.70,ly:0.72,sc:1.0,tx:0.30,ty:0.20,sunx:0.24,suny:0.30};}

// ---------- path builders (parametric — resolution independent) ----------
function pts(f,n){const a=[];for(let i=0;i<=n;i++)a.push(f(i/n));return a;}
function plen(P){let L=0;for(let i=1;i<P.length;i++)L+=Math.hypot(P[i][0]-P[i-1][0],P[i][1]-P[i-1][1]);return L;}
function coast(){const y0=H*0.68;return pts(u=>[u*W*1.04-W*0.02,
 y0+Math.sin(u*5.1+0.7)*H*0.018+Math.sin(u*13)*H*0.008],90);}
function waveLine(k){const y0=H*(0.76+k*0.07);
 return u=>[u*W*1.04-W*0.02, y0+Math.sin(u*9+k*2)*H*0.012];}
function lighthouse(){ // subpaths in unit space around anchor, scaled
 const lx=A.lx.x*W, base=A.ly.x*H, s=A.sc.x*Math.min(W,H);
 const w1=0.052*s,w2=0.034*s,h=0.30*s,cap=0.05*s,gal=0.043*s;
 const X=(dx,dy)=>[lx+dx,base+dy];
 return{
  tower:[X(-w1,0),X(-w2,-h),X(w2,-h),X(w1,0),X(-w1,0)],
  gallery:[X(-gal,-h),X(gal,-h),X(gal,-h-cap*0.5),X(-gal,-h-cap*0.5),X(-gal,-h)],
  lamp:[X(-w2*0.7,-h-cap*0.5),X(0,-h-cap*1.5),X(w2*0.7,-h-cap*0.5)],
  door:[X(-w2*0.45,0),X(-w2*0.45,-0.045*s),X(w2*0.45,-0.045*s),X(w2*0.45,0)],
  bands:[[X(-w1*0.86,-h*0.25),X(w1*0.86,-h*0.25)],[X(-w1*0.72,-h*0.55),X(w1*0.72,-h*0.55)]],
  top:X(0,-h-cap*1.5), lampC:X(0,-h-cap*0.9)};}
function sunPts(){const cx=A.sunx.x*W,cy=A.suny.x*H,r=0.055*Math.min(W,H);
 return pts(u=>[cx+Math.cos(u*6.283-1.57)*r,cy+Math.sin(u*6.283-1.57)*r],48);}

// ---------- the build plan (what an agent stream would emit) ----------
function makePlan(){return[
 {verb:"maskReveal",id:"sky",dur:1400,note:"washing in the sky…"},
 {verb:"strokeIn",id:"coast",dur:1500,width:2.2,note:"sketching the coastline…"},
 {verb:"strokeIn",id:"tower",dur:1600,width:2.4,note:"drawing the lighthouse…"},
 {verb:"strokeIn",id:"gallery",dur:500,width:2.2},
 {verb:"strokeIn",id:"lamp",dur:450,width:2.2},
 {verb:"strokeIn",id:"door",dur:400,width:1.8},
 {verb:"strokeIn",id:"bands",dur:500,width:1.8,note:"detail lines…"},
 {verb:"strokeIn",id:"sun",dur:900,width:2.2,note:"a circle for the sun…"},
 {verb:"materialize",id:"seaFill",dur:1600,note:"now the paint: the sea…"},
 {verb:"materialize",id:"towerFill",dur:1300,note:"pigment on the tower…"},
 {verb:"materialize",id:"sunFill",dur:1000,note:"light…"},
 {verb:"typeSet",id:"title",dur:1600,text:"Harbor Light",note:"setting the title…"},
 {verb:"typeSet",id:"sub",dur:1200,text:"drawn, then painted, then alive",small:1},
 {verb:"beam",id:"beam",dur:800,note:"and the lamp turns."},
];}
let plan=[],done=[],active=null,phase="idle",t0=now(),brushPt=null,ripples=[];
function startBuild(){plan=makePlan();done=[];active=null;phase="painting";t0=now();
 hud.textContent="";logNote("agent stream begins — sketch first, paint after");}
document.getElementById("replay").onclick=startBuild;
addEventListener("click",e=>{if(e.target.id==="replay")return;
 if(phase==="alive"&&e.clientY>H*0.66){ripples.push({x:e.clientX,y:e.clientY,t:now()});
   logNote("patch: ripple on the water (any region responds)");}});

// ---------- verb renderers ----------
function partialStroke(P,p,width,color){ // strokeIn core: draw first p of the path
 if(P.length<2)return P[0];
 const total=plen(P);let need=total*p,last=P[0];
 ctx.strokeStyle=color;ctx.lineWidth=width;ctx.lineJoin="round";ctx.lineCap="round";
 ctx.beginPath();ctx.moveTo(P[0][0],P[0][1]);
 for(let i=1;i<P.length&&need>0;i++){
  const seg=Math.hypot(P[i][0]-P[i-1][0],P[i][1]-P[i-1][1]);
  if(seg<=need){ctx.lineTo(P[i][0],P[i][1]);last=P[i];need-=seg;}
  else{const u=need/seg;last=[lerp(P[i-1][0],P[i][0],u),lerp(P[i-1][1],P[i][1],u)];
       ctx.lineTo(last[0],last[1]);need=0;}}
 ctx.stroke();return last;}
function pathsFor(id){const L=lighthouse();
 switch(id){
  case"coast":return[coast()];
  case"tower":return[L.tower];case"gallery":return[L.gallery];
  case"lamp":return[L.lamp];case"door":return[L.door];case"bands":return L.bands;
  case"sun":return[sunPts()];default:return[];}}
function drawStep(s,p,t){ // p = eased progress 0..1 (1 = complete/settled)
 const L=lighthouse();
 if(s.verb==="strokeIn"){let tip=null;
  for(const P of pathsFor(s.id)){const q=partialStroke(P,p,s.width||2,pal("ink"));if(p<1)tip=q;}
  if(tip)brushPt={x:tip[0],y:tip[1]};return;}
 if(s.verb==="maskReveal"&&s.id==="sky"){
  const cx=A.sunx.x*W,cy=A.suny.x*H;
  ctx.save();if(p<1){ctx.beginPath();ctx.arc(cx,cy,Math.max(30,p*Math.hypot(W,H)*1.05),0,7);ctx.clip();}
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,pal("sky1"));g.addColorStop(1,pal("sky2"));
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // stars ride the sky layer, arriving with night
  ctx.fillStyle=pal("ink");
  for(const st of STARS){const tw=(0.3+0.7*Math.abs(Math.sin(t/900*AMB+st.p)))*cyc;
   if(tw>0.02){ctx.globalAlpha=tw*0.9;ctx.fillRect(st.x*W,st.y*H,st.s,st.s);}}
  ctx.globalAlpha=1;ctx.restore();
  if(p<1)brushPt={x:cx+p*W*0.3,y:cy};return;}
 if(s.verb==="materialize"){
  const settle=easeO(p),blur=(1-settle)*9,jit=(1-settle)*5*AMB; // inkSettle: jitter decays as pigment dries
  ctx.save();if(blur>0.4)ctx.filter=`blur(${blur.toFixed(1)}px)`;
  ctx.globalAlpha=Math.min(1,p*1.5);
  const jx=(Math.random()-0.5)*jit,jy=(Math.random()-0.5)*jit;ctx.translate(jx,jy);
  if(s.id==="seaFill"){const C=coast();
   ctx.beginPath();ctx.moveTo(C[0][0],C[0][1]);for(const q of C)ctx.lineTo(q[0],q[1]);
   ctx.lineTo(W*1.02,H);ctx.lineTo(-W*0.02,H);ctx.closePath();
   const g=ctx.createLinearGradient(0,H*0.68,0,H);g.addColorStop(0,pal("sea"));g.addColorStop(1,pal("sky2"));
   ctx.fillStyle=g;ctx.fill();}
  if(s.id==="towerFill"){
   ctx.fillStyle=pal("tower");ctx.beginPath();
   const T=L.tower;ctx.moveTo(T[0][0],T[0][1]);for(const q of T)ctx.lineTo(q[0],q[1]);ctx.fill();
   ctx.fillStyle=pal("band");
   const s1=L.bands[0],s2=L.bands[1],bw=Math.abs(s1[1][0]-s1[0][0]);
   ctx.fillRect(s1[0][0],s1[0][1]-H*0.012,bw,H*0.024);
   ctx.fillRect(s2[0][0],s2[0][1]-H*0.010,Math.abs(s2[1][0]-s2[0][0]),H*0.020);}
  if(s.id==="sunFill"){const cx=A.sunx.x*W,cy=A.suny.x*H,r=0.052*Math.min(W,H);
   ctx.shadowColor=pal("accent");ctx.shadowBlur=40;
   ctx.fillStyle=pal("accent");ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.fill();ctx.shadowBlur=0;
   if(cyc>0.35){ctx.fillStyle=pal("sky1");ctx.globalAlpha*= (cyc-0.35)/0.65*0.85;
    ctx.beginPath();ctx.arc(cx-r*0.38,cy-r*0.18,r*0.92,0,7);ctx.fill();}}
  ctx.restore();
  if(p<1)brushPt={x:A.lx.x*W,y:A.ly.x*H-H*0.1};return;}
 if(s.verb==="typeSet"){
  const words=s.text.split(" "),fs=(s.small?0.022:0.052)*Math.min(W,H);
  ctx.font=`${fs}px Georgia`;ctx.textBaseline="middle";ctx.textAlign="center";
  const widths=words.map(w=>ctx.measureText(w+" ").width),total=widths.reduce((a,b)=>a+b,0);
  let x=A.tx.x*W-total/2,y=A.ty.x*H+(s.small?fs*2.6:0);
  words.forEach((w,i)=>{const wp=Math.min(1,Math.max(0,p*words.length-i));
   if(wp>0){const e=easeO(wp);ctx.globalAlpha=e*(s.small?0.75:1);
    ctx.fillStyle=pal("ink");ctx.fillText(w,x+widths[i]/2- ctx.measureText(" ").width/2,y+(1-e)*18);
    if(wp<1)brushPt={x:x+widths[i]/2,y};}
   x+=widths[i];});
  ctx.globalAlpha=1;return;}
 if(s.verb==="beam"){
  const L2=lighthouse(),c=L2.lampC,ang=t/3800*AMB;
  const len=Math.hypot(W,H)*0.9,spread=0.16;
  ctx.save();ctx.globalCompositeOperation="screen";ctx.globalAlpha=Math.min(0.5,p*0.5)*(0.8+0.2*Math.sin(t/600));
  const g=ctx.createRadialGradient(c[0],c[1],0,c[0],c[1],len);
  g.addColorStop(0,pal("beam"));g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(c[0],c[1]);
  ctx.arc(c[0],c[1],len,ang-spread,ang+spread);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(c[0],c[1]);
  ctx.arc(c[0],c[1],len,ang+Math.PI-spread,ang+Math.PI+spread);ctx.closePath();ctx.fill();
  ctx.restore();
  // lamp glow
  ctx.fillStyle=pal("beam");ctx.globalAlpha=Math.min(1,p*1.2)*(0.75+0.25*Math.sin(t/500));
  ctx.beginPath();ctx.arc(c[0],c[1],3.5,0,7);ctx.fill();ctx.globalAlpha=1;return;}
}
const STARS=[...Array(120)].map(()=>({x:Math.random(),y:Math.random()*0.5,p:Math.random()*7,s:1+Math.random()}));
let BIRDS=[];

// ---------- self-healing render loop ----------
let last=now(),lastFrame=now(),errs=0;
window.onerror=m=>{logNote("⚠ "+String(m).slice(0,80));return false;};
function frame(){lastFrame=now();
 try{render();}catch(e){errs++;if(errs<4)logNote("⚠ frame ("+errs+"): "+String(e.message||e).slice(0,80));
  try{ctx.setTransform(DPR,0,0,DPR,0,0);}catch(_){}}
 requestAnimationFrame(frame);}
setInterval(()=>{if(now()-lastFrame>1500){logNote("⚠ loop stalled — restarting");lastFrame=now();
 requestAnimationFrame(frame);}},2000);

function render(){
 const t=now(),dt=Math.min(0.05,(t-last)/1000);last=t;
 cyc=0.5+0.5*Math.sin((t-t0)/26000*AMB-1.6);
 const tg=anchorTargets();for(const k in A)step(A[k],tg[k],dt);
 ctx.clearRect(0,0,W,H);
 // step scheduler: strokes run sequentially; the eased head IS the choreography
 if(phase==="painting"){
  if(!active&&plan.length){active={...plan.shift(),t0:t};if(active.note)logNote(active.note);}
  if(active){const u=Math.min(1,(t-active.t0)/active.dur);active.p=easeIO(u);
   if(u>=1){active.p=1;done.push(active);active=null;
    if(!plan.length){phase="alive";logNote("complete — it lives. resize me. click the water.");brushPt=null;}}}}
 // draw completed steps (settled), then the active one (in flight)
 for(const s of done)drawStep(s,1,t);
 if(active)drawStep(active,active.p,t);
 // living extras once the sea exists
 if(done.some(s=>s.id==="seaFill")){
  ctx.globalAlpha=0.5;
  for(let k=0;k<3;k++){const f=waveLine(k),ph=t/(1400+k*500)*AMB;
   ctx.strokeStyle=pal("seaHi");ctx.lineWidth=1.1;ctx.beginPath();
   for(let i=0;i<=70;i++){const u=i/70,q=f(u);ctx[i?"lineTo":"moveTo"](q[0],q[1]+Math.sin(u*11+ph*6.28)*H*0.006);}
   ctx.stroke();}
  ctx.globalAlpha=1;}
 // birds (occasional, drawn as two strokes — path primitives at their smallest)
 if(phase==="alive"&&Math.random()<0.003*AMB&&BIRDS.length<4)
  BIRDS.push({x:-0.05,y:0.18+Math.random()*0.2,v:0.00006+Math.random()*0.00005,t});
 BIRDS=BIRDS.filter(b=>b.x<1.1);
 for(const b of BIRDS){b.x+=b.v*(t-b.t);const bx=b.x*W,by=b.y*H+Math.sin(t/300+b.x*30)*4;
  const f=Math.sin(t/150+b.x*40)*4;
  ctx.strokeStyle=pal("ink");ctx.lineWidth=1.4;ctx.globalAlpha=0.8;
  ctx.beginPath();ctx.moveTo(bx-7,by-f);ctx.quadraticCurveTo(bx,by+3,bx,by);
  ctx.moveTo(bx+7,by-f);ctx.quadraticCurveTo(bx,by+3,bx,by);ctx.stroke();ctx.globalAlpha=1;}
 // ripples
 ripples=ripples.filter(r=>t-r.t<900);
 for(const r of ripples){const u=(t-r.t)/900;ctx.globalAlpha=(1-u)*0.7;ctx.strokeStyle=pal("seaHi");
  ctx.lineWidth=1.3;ctx.beginPath();ctx.ellipse(r.x,r.y,u*70,u*22,0,0,7);ctx.stroke();ctx.globalAlpha=1;}
 // the brush
 if(brushPt&&phase==="painting"){
  ctx.shadowColor=pal("accent");ctx.shadowBlur=22;ctx.fillStyle=pal("ink");
  ctx.beginPath();ctx.arc(brushPt.x,brushPt.y,4.5,0,7);ctx.fill();ctx.shadowBlur=0;}
}
requestAnimationFrame(frame);
startBuild();
</script>
</body>
</html>
