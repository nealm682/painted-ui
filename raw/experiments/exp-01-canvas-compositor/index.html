<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>exp-01 — scene-graph canvas compositor</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0e0d12;font-family:Georgia,serif}
  canvas{display:block;width:100vw;height:100vh}
  #hud{position:fixed;left:12px;bottom:10px;color:#8a86a0;font:12px/1.5 monospace;pointer-events:none;white-space:pre}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<script>
/* ============================================================
   exp-01: reproduce Flipbook illusion ingredients 1–3
   with a static scene graph + client compositor. No model,
   no server, no HTML layout. ~60fps on integrated graphics.
   Ingredient 1 (fluid layout): percent/anchor layout, spring-resolved on resize
   Ingredient 2 (live motion):  Ken Burns, particles, breathing, build-in reveal
   Ingredient 3 (interactivity): exact hit-testing from node semantics,
                                 plus runtime "promotion" of a decorative node
   ============================================================ */

// ---- The scene graph an LLM would emit (hand-authored stand-in) ----
const SCENE = {
  palette:{bg0:"#0e0d12",bg1:"#1c1430",ink:"#efeae0",accent:"#e8a34c",soft:"#5b4a8a"},
  nodes:[
    {id:"sky",     kind:"gradient", rect:{x:0,y:0,w:1,h:1}, from:"bg1", to:"bg0", z:0},
    {id:"stars",   kind:"particles", rect:{x:0,y:0,w:1,h:0.7}, count:90, z:1,
                    semantic:"decorative night sky"},
    {id:"moon",    kind:"disc", anchor:{x:0.78,y:0.18}, r:0.055, fill:"ink", glow:"accent", z:2,
                    semantic:"the moon", interactive:false, breathe:true},
    {id:"hills",   kind:"blob", anchor:{x:0.5,y:0.98}, w:1.25, h:0.42, fill:"soft", z:3,
                    kenburns:{amp:0.012,period:14}, semantic:"rolling hills illustration"},
    {id:"title",   kind:"text", anchor:{x:0.5,y:0.30}, size:0.072, fill:"ink",
                    text:"Night Garden", z:4, semantic:"scene title"},
    {id:"subtitle",kind:"text", anchorTo:{id:"title",dy:0.075}, size:0.024, fill:"accent",
                    text:"a scene graph, composited on your GPU", z:4, semantic:"subtitle"},
    {id:"cta",     kind:"pill", anchorTo:{id:"subtitle",dy:0.10}, w:0.22,h:0.062, fill:"accent",
                    text:"Enter the garden", z:5, interactive:true,
                    semantic:"primary call-to-action: enter"},
  ]
};

// ---- Compositor ----
const cv=document.getElementById("c"),ctx=cv.getContext("2d"),hud=document.getElementById("hud");
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
const springs={}; // per-node spring state for layout resolve (ingredient 1)
function spring(id,key,target,stiff=6){ // critically-damped-ish spring toward target
  const k=id+":"+key; let s=springs[k]||(springs[k]={v:0,x:target});
  const dt=1/60, f=stiff*(target-s.x); s.v=(s.v+f*dt)*0.82; s.x+=s.v; return s.x;
}
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);resize();

// build-in reveal: nodes mount staggered, as if streaming in (ingredient 2/4 tease)
const t0=performance.now();
const mountAt={}; SCENE.nodes.forEach((n,i)=>mountAt[n.id]=600+i*420);
function alpha(n,now){const m=now-t0-mountAt[n.id];return m<0?0:Math.min(1,m/700);}

const stars=[...Array(200)].map(()=>({x:Math.random(),y:Math.random(),p:Math.random()*6.28,s:Math.random()}));
const layout={}; // resolved rects per node, for hit-testing
function col(name){return SCENE.palette[name]||name;}

function layoutNode(n,now){
  // percent/anchor layout resolved against CURRENT window, spring-animated
  const min=Math.min(W,H);
  let cx,cy;
  if(n.anchorTo){const p=layout[n.anchorTo.id];cx=p?p.cx:W/2;cy=(p?p.cy:H/2)+ (n.anchorTo.dy||0)*H;}
  else if(n.anchor){cx=n.anchor.x*W;cy=n.anchor.y*H;}
  else {cx=W/2;cy=H/2;}
  cx=spring(n.id,"cx",cx);cy=spring(n.id,"cy",cy);
  const r=(n.r||0)*min, w=(n.w||0)*W, h=(n.h||0)*H, size=(n.size||0)*min;
  layout[n.id]={cx,cy,r:r||Math.max(w,h)/2,w,h,size,node:n};
  return layout[n.id];
}

let hover=null, promoted=false, clicks=[];
function draw(now){
  ctx.clearRect(0,0,W,H);
  const t=(now-t0)/1000;
  for(const n of [...SCENE.nodes].sort((a,b)=>a.z-b.z)){
    const a=alpha(n,now); if(a===0){layoutNode(n,now);continue;}
    const L=layoutNode(n,now); ctx.globalAlpha=a;
    if(n.kind==="gradient"){
      const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,col(n.from));g.addColorStop(1,col(n.to));
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    } else if(n.kind==="particles"){
      ctx.fillStyle=col("ink");
      for(const s of stars.slice(0,n.count)){const tw=0.25+0.75*Math.abs(Math.sin(t*0.7+s.p));
        ctx.globalAlpha=a*tw*0.8;ctx.fillRect(s.x*W,s.y*H*n.rect.h,1.3+s.s,1.3+s.s);}
    } else if(n.kind==="disc"){
      const breathe=n.breathe?1+0.03*Math.sin(t*1.1):1;
      const R=L.r*breathe*(hover===n.id?1.12:1);
      ctx.shadowColor=col(n.glow);ctx.shadowBlur=hover===n.id?60:35;
      ctx.fillStyle=col(n.fill);ctx.beginPath();ctx.arc(L.cx,L.cy,R,0,7);ctx.fill();ctx.shadowBlur=0;
      layout[n.id].r=R;
    } else if(n.kind==="blob"){
      // Ken Burns: slow drift/zoom on the illustration layer (ingredient 2)
      const kb=n.kenburns,ph=kb?Math.sin(t*6.28/kb.period):0;
      const zx=1+ (kb?kb.amp:0)*ph, dx=(kb?kb.amp:0)*W*0.5*Math.cos(t*6.28/(kb.period*1.7));
      ctx.fillStyle=col(n.fill);ctx.beginPath();
      const bw=L.w*zx,bh=L.h;
      ctx.moveTo(L.cx-bw/2+dx,L.cy);
      for(let i=0;i<=24;i++){const u=i/24,x=L.cx-bw/2+dx+u*bw;
        const y=L.cy-bh*(0.55+0.25*Math.sin(u*9+1.4)+0.2*Math.sin(u*23));ctx.lineTo(x,y);}
      ctx.lineTo(L.cx+bw/2+dx,L.cy+H);ctx.lineTo(L.cx-bw/2+dx,L.cy+H);ctx.closePath();ctx.fill();
    } else if(n.kind==="text"){
      ctx.fillStyle=col(n.fill);ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.font=`${L.size}px Georgia`;ctx.fillText(n.text,L.cx,L.cy);
      layout[n.id].w=ctx.measureText(n.text).width;layout[n.id].h=L.size;
    } else if(n.kind==="pill"){
      const hovering=hover===n.id, s=hovering?1.05:1;
      const w=Math.max(L.w,160)*s,h=Math.max(L.h,44)*s;
      ctx.fillStyle=col(n.fill);ctx.globalAlpha=a*(hovering?1:0.92);
      ctx.beginPath();ctx.roundRect(L.cx-w/2,L.cy-h/2,w,h,h/2);ctx.fill();
      ctx.fillStyle=col("bg0");ctx.font=`${h*0.4}px Georgia`;ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(n.text,L.cx,L.cy);layout[n.id].w=w;layout[n.id].h=h;
    }
    ctx.globalAlpha=1;
  }
  // click ripples (instant local feedback — ingredient 3)
  clicks=clicks.filter(c=>now-c.t<600);
  for(const c of clicks){const u=(now-c.t)/600;ctx.globalAlpha=1-u;ctx.strokeStyle=col("accent");
    ctx.beginPath();ctx.arc(c.x,c.y,u*46,0,7);ctx.stroke();ctx.globalAlpha=1;}
  hud.textContent=`hit: ${hover?layout[hover].node.semantic:"—"}`+
    `\nmoon interactive: ${promoted?"yes (promoted at runtime)":"no (click it to promote)"}`+
    `\nresize the window → layout springs to new solution`;
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ---- Exact semantic hit-testing (ingredient 3) ----
function hitTest(x,y){
  for(const n of [...SCENE.nodes].sort((a,b)=>b.z-a.z)){
    const L=layout[n.id];if(!L)continue;
    if(n.kind==="disc"&&Math.hypot(x-L.cx,y-L.cy)<L.r+6)return n.id;
    if((n.kind==="pill"||n.kind==="text")&&Math.abs(x-L.cx)<L.w/2+8&&Math.abs(y-L.cy)<L.h/2+8)return n.id;
  }
  return null;
}
addEventListener("mousemove",e=>{
  hover=hitTest(e.clientX,e.clientY);
  const n=hover&&layout[hover].node;
  cv.style.cursor=n&&(n.interactive||(n.id==="moon"))?"pointer":"default";
});
addEventListener("click",e=>{
  clicks.push({x:e.clientX,y:e.clientY,t:performance.now()});
  const id=hitTest(e.clientX,e.clientY);
  if(id==="moon"&&!promoted){
    // runtime PROMOTION: the "model" patches one node from decoration → interactive
    promoted=true;const moon=SCENE.nodes.find(n=>n.id==="moon");moon.interactive=true;
    SCENE.nodes.push({id:"moonlabel",kind:"text",anchorTo:{id:"moon",dy:0.09},size:0.02,
      fill:"accent",text:"the moon is listening now",z:6,semantic:"promoted-node label"});
    mountAt["moonlabel"]=performance.now()-t0; // mounts with build-in reveal
  }
});
</script>
</body>
</html>
