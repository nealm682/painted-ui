<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>exp-09 — Painted UI showcase</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0910;font-family:Georgia,serif;cursor:default}
  canvas{display:block;width:100vw;height:100vh}
  #hud{position:fixed;left:14px;bottom:12px;color:#6f6a88;font:11.5px/1.5 monospace;pointer-events:none;white-space:pre-wrap;max-width:44vw}
  #hint{position:fixed;right:14px;bottom:12px;color:#6f6a88;font:11.5px monospace;text-align:right}
  #replay{position:fixed;right:14px;top:12px;background:rgba(20,18,28,.7);border:1px solid #2c2840;
          color:#c9c4dd;border-radius:8px;padding:6px 13px;font:13px Georgia;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="hint">resize the window — the scene repaints itself<br>click a card · click the sky · everything responds</div>
<button id="replay">↻ repaint</button>
<script>
/* ============================================================
   exp-09: the showcase. Built to answer the audit's hardest line
   ("current scenes can still resemble animated dashboards") and
   the failed probes: resize now triggers a spring-animated
   constraint RE-SOLVE (row→column restack), and the build is a
   visible BRUSH traveling the canvas, blooming each element
   radially into existence. The scene then lives indefinitely:
   palette drifts dusk↔night, sun becomes moon, stars arrive,
   imagery repaints itself, and every element answers the cursor.
   ============================================================ */
const cv=document.getElementById("c"),ctx=cv.getContext("2d");
const hud=document.getElementById("hud");
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);resize();
const REDUCED=matchMedia("(prefers-reduced-motion: reduce)").matches;
const AMB=REDUCED?0.25:1;                       // accessibility: soften all ambient motion
const now=()=>performance.now();
const lerp=(a,b,t)=>a+(b-a)*t;
function mixc(c1,c2,t){const h=c=>[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
 const a=h(c1),b=h(c2);return`rgb(${a.map((v,i)=>Math.round(lerp(v,b[i],t))).join(",")})`;}

// ---------- day/night cycle (the gardener) ----------
const DUSK={top:"#2b2149",bot:"#0d0b13",sun:"#e8a34c",ink:"#f2ecdf",ridgeA:"#4a3a72",ridgeB:"#241b3e",accent:"#e8a34c"};
const NIGHT={top:"#0d1a30",bot:"#070a12",sun:"#e6ecf8",ink:"#e9edf6",ridgeA:"#1e2a45",ridgeB:"#101827",accent:"#9fb4e8"};
let cyc=0; // 0=dusk 1=night, oscillates
function pal(k){return mixc(DUSK[k],NIGHT[k],cyc);}

// ---------- responsive constraint layout (re-solved every frame) ----------
function targets(id){
 const narrow=W/H<0.95;
 const L={
  title:   narrow?{x:.5,y:.10,s:.055}:{x:.5,y:.13,s:.068},
  subtitle:narrow?{x:.5,y:.155,s:.021}:{x:.5,y:.195,s:.024},
  sun:     narrow?{x:.84,y:.06,r:.045}:{x:.80,y:.16,r:.065},
  card0:   narrow?{x:.5,y:.36,w:.84,h:.17}:{x:.22,y:.60,w:.23,h:.34},
  card1:   narrow?{x:.5,y:.56,w:.84,h:.17}:{x:.50,y:.60,w:.23,h:.34},
  card2:   narrow?{x:.5,y:.76,w:.84,h:.17}:{x:.78,y:.60,w:.23,h:.34},
  pill:    narrow?{x:.5,y:.92,w:.5,h:.055}:{x:.5,y:.885,w:.2,h:.06},
 };
 return L[id];}

// ---------- springs (underdamped — the settle is the point) ----------
function mkSpring(v){return{x:v,v:0};}
function stepSpring(s,target,dt,k=90,d=13){const f=k*(target-s.x)-d*s.v;s.v+=f*dt;s.x+=s.v*dt;return s.x;}

// ---------- scene state ----------
let nodes=new Map(),brush=null,queue=[],phase="idle",hero=null,ripples=[],flies=[],t0=now();
const assets={};
function asset(seed){if(assets[seed])return assets[seed];
 const S=512,s=document.createElement("canvas");s.width=s.height=S;const g=s.getContext("2d");
 let r=(seed*2654435761)%2147483647||1;const rnd=()=>((r=r*16807%2147483647)/2147483647);
 const hue=rnd()*360,bg=g.createLinearGradient(0,0,0,S);
 bg.addColorStop(0,`hsl(${hue},48%,${24+rnd()*16}%)`);bg.addColorStop(1,`hsl(${(hue+45)%360},52%,11%)`);
 g.fillStyle=bg;g.fillRect(0,0,S,S);
 for(let i=0;i<9;i++){g.fillStyle=`hsla(${(hue+rnd()*90)%360},58%,${32+rnd()*38}%,${.14+rnd()*.28})`;
  g.beginPath();g.ellipse(rnd()*S,rnd()*S,60+rnd()*150,40+rnd()*110,rnd()*3,0,7);g.fill();}
 // painterly grain
 for(let i=0;i<700;i++){g.fillStyle=`hsla(${hue},30%,${rnd()*100}%,0.04)`;g.fillRect(rnd()*S,rnd()*S,2,2);}
 return assets[seed]=s;}
const stars=[...Array(140)].map(()=>({x:Math.random(),y:Math.random()*0.55,p:Math.random()*7,s:.6+Math.random()}));
const drift=[...Array(70)].map(()=>({x:Math.random(),y:Math.random(),p:Math.random()*7,v:.004+Math.random()*.01}));

function mount(id,kind,extra){ // node with springs toward its layout targets
 const tg=targets(id)||extra||{};
 const n={id,kind,sx:mkSpring(tg.x??extra?.x??.5),sy:mkSpring(tg.y??extra?.y??.5),
  sw:mkSpring(tg.w??extra?.w??0),sh:mkSpring(tg.h??extra?.h??0),sr:mkSpring(tg.r??extra?.r??0),
  ss:mkSpring(tg.s??extra?.s??0),...extra,rev:null,born:now()};
 nodes.set(id,n);return n;}

// ---------- the build: a brush paints the scene in ----------
const BUILD=[
 {id:"sky",kind:"sky",note:"washing in the sky…"},
 {id:"ridgeB",kind:"ridge",layer:1,note:"blocking the far ridge…"},
 {id:"ridgeA",kind:"ridge",layer:0,note:"the near hills…"},
 {id:"sun",kind:"sun",note:"placing the light…"},
 {id:"title",kind:"text",text:"The Coast Road",note:"setting the title…"},
 {id:"subtitle",kind:"text",text:"three stops, painted while you watch",small:1},
 {id:"card0",kind:"card",img:7, label:"Tidepools"},
 {id:"card1",kind:"card",img:19,label:"Lighthouse"},
 {id:"card2",kind:"card",img:31,label:"Dunes",note:"laying in the stops…"},
 {id:"pill",kind:"pill",text:"Begin the drive",note:"one affordance…"},
];
function startBuild(){
 nodes.clear();hero=null;phase="painting";queue=BUILD.slice();t0=now();
 brush={x:W*0.1,y:H*0.15,tx:W*0.5,ty:H*0.5,trail:[],dwell:0,target:null};
 logNote("agent stream begins — watch the brush");}
function logNote(s){hud.textContent=(hud.textContent+"\n→ "+s).split("\n").slice(-6).join("\n");}

// ---------- interaction ----------
function hitCard(px,py){for(const id of["card0","card1","card2"]){const n=nodes.get(id);if(!n)continue;
  const x=n.sx.x*W,y=n.sy.x*H,w=n.sw.x*W,h=n.sh.x*H;
  if(Math.abs(px-x)<w/2&&Math.abs(py-y)<h/2)return n;}return null;}
let mouse={x:-1,y:-1};
addEventListener("mousemove",e=>{mouse={x:e.clientX,y:e.clientY};
 cv.style.cursor=hitCard(e.clientX,e.clientY)?"pointer":"default";});
addEventListener("click",e=>{
 if(e.target.id==="replay")return;
 if(phase!=="alive")return;
 const c=hitCard(e.clientX,e.clientY);
 ripples.push({x:e.clientX,y:e.clientY,t:now()});
 if(c){ if(hero===c.id){hero=null;logNote("patch: restore gallery (morph back)");}
        else{hero=c.id;logNote(`patch: focus ${c.label} → hero morph, siblings yield`);} }
 else{for(let i=0;i<9;i++)flies.push({x:e.clientX,y:e.clientY,a:Math.random()*7,v:.4+Math.random()*.9,t:now()});
      logNote("patch: fireflies (decorative node promoted by a click)");}});
document.getElementById("replay").onclick=()=>{hud.textContent="";startBuild();};

// hero-aware layout override
function heroTargets(id){
 if(!hero)return targets(id);
 const cards=["card0","card1","card2"];
 if(id===hero)return{x:.5,y:.52,w:Math.min(.72,.9*H/W*1.2),h:.5};
 if(cards.includes(id)){const others=cards.filter(c=>c!==hero);const i=others.indexOf(id);
   return{x:.5,y:.52,w:0.001,h:0.001,gone:1,side:i===0?-1:1};}
 if(id==="title")return{...targets("title"),y:.09};
 if(id==="pill")return{...targets("pill"),y:.93};
 return targets(id);}

// ---------- draw (self-healing: one bad frame can never freeze the painting) ----------
let last=now(),lastFrame=now(),drawErrs=0;
window.onerror=(m)=>{logNote("⚠ error: "+String(m).slice(0,80));return false;};
function draw(){
 lastFrame=now();
 try{drawFrame();}
 catch(e){drawErrs++;if(drawErrs<4)logNote("⚠ frame error ("+drawErrs+"): "+String(e.message||e).slice(0,80));
   try{ctx.setTransform(DPR,0,0,DPR,0,0);}catch(_){}}
 requestAnimationFrame(draw);}   // ALWAYS re-arm, error or not
setInterval(()=>{if(now()-lastFrame>1500){logNote("⚠ render loop stalled — restarting");
 lastFrame=now();requestAnimationFrame(draw);}},2000);
function drawFrame(){
 const t=now(),dt=Math.min(0.05,(t-last)/1000);last=t;
 cyc=0.5+0.5*Math.sin((t-t0)/26000*AMB- 1.6);          // dusk↔night, ~52s cycle
 ctx.clearRect(0,0,W,H);
 // camera breath
 ctx.save();const br=1+0.006*AMB*Math.sin(t/7000);
 ctx.translate(W/2,H/2);ctx.scale(br,br);ctx.translate(-W/2,-H/2);

 // brush logic (painting phase)
 if(phase==="painting"&&brush){
  if(!brush.target&&queue.length){const item=queue.shift();brush.target=item;
    const tg=targets(item.id)||{x:.5,y:.5};brush.tx=(tg.x??.5)*W;brush.ty=(tg.y??.5)*H;
    if(item.note)logNote(item.note);}
  if(brush.target){
    brush.x=lerp(brush.x,brush.tx,1-Math.pow(0.0018,dt));brush.y=lerp(brush.y,brush.ty,1-Math.pow(0.0018,dt));
    brush.trail.push({x:brush.x,y:brush.y,t});brush.trail=brush.trail.filter(p=>t-p.t<450);
    if(Math.hypot(brush.x-brush.tx,brush.y-brush.ty)<18){
      const it=brush.target;const n=mount(it.id,it.kind,it);
      n.rev={bx:brush.x,by:brush.y,t0:t};brush.dwell=t;brush.target=null;}}
  else if(!queue.length){phase="alive";logNote("scene complete — it keeps living. try resizing.");brush.fade=t;}
 }
 // draw nodes back-to-front
 const orderK={sky:0,ridge:1,sun:2,text:4,card:3,pill:5};
 for(const n of[...nodes.values()].sort((a,b)=>((orderK[a.kind]??3)+(a.layer??0)*0.1)-((orderK[b.kind]??3)+(b.layer??0)*0.1))){
  const tg=heroTargets(n.id)||{};
  const x=stepSpring(n.sx,tg.x??n.sx.x,dt)*W, y=stepSpring(n.sy,tg.y??n.sy.x,dt)*H;
  const w=stepSpring(n.sw,tg.w??n.sw.x,dt)*W, h=stepSpring(n.sh,tg.h??n.sh.x,dt)*H;
  const r=stepSpring(n.sr,tg.r??n.sr.x,dt)*Math.min(W,H), fs=stepSpring(n.ss,tg.s??n.ss.x,dt)*Math.min(W,H);
  // radial reveal clip
  let alpha=1;
  if(n.rev){const u=(t-n.rev.t0)/900;if(u>=1)n.rev=null;else{alpha=Math.min(1,u*1.6);
    ctx.save();ctx.beginPath();ctx.arc(n.rev.bx,n.rev.by,Math.max(20,u*Math.hypot(W,H)*0.9),0,7);ctx.clip();}}
  ctx.globalAlpha=alpha;
  if(n.kind==="sky"){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,pal("top"));g.addColorStop(1,pal("bot"));
    ctx.fillStyle=g;ctx.fillRect(-W*0.1,-H*0.1,W*1.2,H*1.2);
    // stars (arrive with night)
    ctx.fillStyle=pal("ink");
    for(const s of stars){const tw=(0.3+0.7*Math.abs(Math.sin(t/900*AMB+s.p)))*cyc;
      if(tw>0.02){ctx.globalAlpha=alpha*tw*0.9;ctx.fillRect(s.x*W,s.y*H,s.s*1.5,s.s*1.5);}}
    // drift motes (always)
    ctx.globalAlpha=alpha*0.35;
    for(const d of drift){d.y-=d.v*dt*AMB*3;if(d.y<0)d.y=1;
      ctx.fillRect(((d.x+Math.sin(t/5000+d.p)*0.01)%1)*W,d.y*H,1.4,1.4);}
    ctx.globalAlpha=alpha;}
  else if(n.kind==="ridge"){const far=n.layer===1,base=far?0.62:0.78,amp=far?0.10:0.14;
    ctx.fillStyle=far?pal("ridgeB"):pal("ridgeA");ctx.beginPath();
    const ph=t/(far?23000:16000)*AMB;
    ctx.moveTo(-W*0.1,H);
    for(let i=0;i<=60;i++){const u=i/60,px=-W*0.1+u*W*1.2;
      const py=H*(base+amp*(0.5*Math.sin(u*7+ph+(far?2:0))+0.3*Math.sin(u*17-ph*1.4)+0.2*Math.sin(u*31)) - amp);
      ctx.lineTo(px,py);}
    ctx.lineTo(W*1.1,H);ctx.closePath();ctx.fill();}
  else if(n.kind==="sun"){const R=Math.max(0.1,r*(1+0.035*AMB*Math.sin(t/1100)));
    ctx.shadowColor=pal("sun");ctx.shadowBlur=50+22*AMB*Math.sin(t/1400);
    ctx.fillStyle=pal("sun");ctx.beginPath();ctx.arc(x,y,R,0,7);ctx.fill();ctx.shadowBlur=0;
    // waning crescent shadow as night comes
    if(cyc>0.35){ctx.fillStyle=pal("top");ctx.globalAlpha=alpha*(cyc-0.35)/0.65*0.85;
      ctx.beginPath();ctx.arc(x-R*0.38,y-R*0.18,R*0.92,0,7);ctx.fill();ctx.globalAlpha=alpha;}}
  else if(n.kind==="text"){ctx.fillStyle=pal("ink");ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.font=`${fs||24}px Georgia`;
    const wob=n.small?0:AMB*Math.sin(t/3000)*2;
    ctx.globalAlpha=alpha*(n.small?0.75:1);ctx.fillText(n.text,x,y+wob);ctx.globalAlpha=alpha;}
  else if(n.kind==="card"){if(w<3||h<3){if(n.rev){ctx.restore();}ctx.globalAlpha=1;continue;}
    const hov=hitCard(mouse.x,mouse.y)===n&&phase==="alive";
    const ww=w*(hov&&hero!==n.id?1.045:1),hh=h*(hov&&hero!==n.id?1.045:1),rad=Math.min(ww,hh)*0.07;
    ctx.save();ctx.beginPath();ctx.roundRect(x-ww/2,y-hh/2,ww,hh,rad);ctx.clip();
    // Ken Burns, generous, never pauses; periodic repaint (asset swap) with cross-dissolve
    // BOUNDED asset pool: cycle 4 fixed variants per card — v1 generated new
    // canvases forever, a likely context-killer on some machines (run-1 freeze)
    const swapPeriod=14000,k=Math.floor((t-t0)/swapPeriod),su=((t-t0)%swapPeriod)/swapPeriod;
    const seedA=(n.img||1)+(k%4)*2,seedB=(n.img||1)+((k+1)%4)*2;
    const kb=1.10+0.06*AMB*Math.sin(t/3400+(n.img||0)),dx=AMB*Math.sin(t/5200+(n.img||0))*ww*0.05;
    const di=(seed,a)=>{ctx.globalAlpha=alpha*a;ctx.drawImage(asset(seed),x-ww*kb/2+dx,y-hh*kb/2,ww*kb,hh*kb);};
    di(seedA,1);if(su>0.86)di(seedB,(su-0.86)/0.14);
    ctx.globalAlpha=alpha;
    const bh=Math.max(26,hh*0.14);ctx.fillStyle="rgba(6,6,12,.5)";ctx.fillRect(x-ww/2,y+hh/2-bh,ww,bh);
    ctx.fillStyle=pal("ink");ctx.font=`${Math.max(13,Math.min(W,H)*0.024)}px Georgia`;
    ctx.textAlign="left";ctx.textBaseline="middle";
    ctx.fillText(hero===n.id?n.label+" — you're here":n.label,x-ww/2+12,y+hh/2-bh/2);
    if(hov){ctx.strokeStyle=pal("accent");ctx.lineWidth=2;ctx.globalAlpha=alpha*(0.55+0.45*Math.sin(t/450));
      ctx.strokeRect(x-ww/2+2,y-hh/2+2,ww-4,hh-4);ctx.globalAlpha=alpha;}
    ctx.restore();}
  else if(n.kind==="pill"){const ww=Math.max(w,140),hh=Math.max(h,42);
    const breathe=1+0.02*AMB*Math.sin(t/1600);
    ctx.shadowColor=pal("accent");ctx.shadowBlur=14+8*AMB*Math.sin(t/1600);
    ctx.fillStyle=pal("accent");ctx.beginPath();ctx.roundRect(x-ww*breathe/2,y-hh*breathe/2,ww*breathe,hh*breathe,hh/2);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle=pal("bot");ctx.font=`${hh*0.42}px Georgia`;
    ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(n.text,x,y);}
  if(n.rev)ctx.restore();
  ctx.globalAlpha=1;}

 // brush on top
 if(brush&&(phase==="painting"||t-(brush.fade||0)<900)){
  const fade=phase==="painting"?1:1-(t-brush.fade)/900;
  for(const p of brush.trail){const u=1-(t-p.t)/450;ctx.globalAlpha=u*0.5*fade;
    ctx.fillStyle=pal("accent");ctx.beginPath();ctx.arc(p.x,p.y,3.5*u+1,0,7);ctx.fill();}
  ctx.globalAlpha=fade;ctx.shadowColor=pal("accent");ctx.shadowBlur=24;
  ctx.fillStyle=pal("ink");ctx.beginPath();ctx.arc(brush.x,brush.y,5,0,7);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;}

 // ripples + fireflies
 ripples=ripples.filter(rp=>t-rp.t<700);
 for(const rp of ripples){const u=(t-rp.t)/700;ctx.globalAlpha=1-u;ctx.strokeStyle=pal("accent");
  ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(rp.x,rp.y,u*60,0,7);ctx.stroke();ctx.globalAlpha=1;}
 flies=flies.filter(f=>t-f.t<2600);
 for(const f of flies){const u=(t-f.t)/2600;f.a+=Math.sin(t/300+f.a)*0.12;
  f.x+=Math.cos(f.a)*f.v;f.y+=Math.sin(f.a)*f.v-0.08;
  ctx.globalAlpha=(1-u)*(0.5+0.5*Math.sin(t/180+f.a));ctx.fillStyle=pal("accent");
  ctx.beginPath();ctx.arc(f.x,f.y,2,0,7);ctx.fill();ctx.globalAlpha=1;}
 ctx.restore();
}
requestAnimationFrame(draw);
startBuild();
</script>
</body>
</html>
